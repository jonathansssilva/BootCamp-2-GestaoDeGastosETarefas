name: Testes Automatizados

# 1. Quando esse robô deve trabalhar?
on:
  push:
    branches: [ "main" ] # Toda vez que você enviar código para a branch principal
  pull_request:
    branches: [ "main" ] # Quando alguém tentar mesclar um código novo

# 2. O que ele deve fazer?
jobs:
  testar-codigo:
    runs-on: ubuntu-latest # O robô vai criar um computador virtual com Linux
    
    steps:
    # Passo 1: O robô baixa o seu código do repositório
    - name: Baixar o código
      uses: actions/checkout@v4

    # Passo 2: O robô instala o Node.js (necessário para rodar o Jest)
    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # Passo 3: O robô instala as dependências (baixa o Jest)
    - name: Instalar dependências
      run: npm install

    # Passo 4: O robô roda os testes!
    - name: Rodar os testes
      run: npm run test