name: Testes Automatizados


on:
  push:
    branches: [ "main" ] 
  pull_request:
    branches: [ "main" ] 

jobs:
  testar-codigo:
    runs-on: ubuntu-latest 
    
    steps:
    
    - name: Baixar o código
      uses: actions/checkout@v4

    
    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    
    - name: Instalar dependências
      run: npm install

   
    - name: Rodar os testes
      run: npm run test